 Immersion Expert","text":"Deputy General Secretary at Lijiang Conservation and Development Association, Deputy Chief Editor of Lijiang Wenhai Ecotourism Guidebook and Lijiang Laojun Mountains Climate Change Brochure.  Graduated from Anqing Normal University with Bachelor of Arts in Art Design. Completed nature education course certified by China Nature Education Network. Former Chief Editor at Enjoy Cambodia expat magazine, English and Art Teacher at Lijiang Voice in Nature Education Co. Ltd., Founder of Lynne玲 Art Studio. Lynne's deep connection to Yunnan and her passion for cultural discovery and preservation ensure our programs are culturally sensitive and contribute to the well-being of local communities.\n","image":{"type":"ImageBlock","url":"/images/shared/presets/Lynne2.webp","altText":"Lynne Lyu - Cofounder of Lijiang Cloud Mountain Education","styles":{"self":{"borderRadius":"x-large"}},"__metadata":{"modelName":"ImageBlock"}},"actions":[],"colors":"bg-light-fg-dark","styles":{"self":{"padding":["pt-4","pl-4","pb-4","pr-4"],"borderRadius":"x-large","flexDirection":"col"}},"__metadata":{"modelName":"FeaturedItem"}},{"type":"FeaturedItem","title":"Lukasz Madrzynski","tagline":"","subtitle":"Co-founder \u0026 Nature Immersion Expert","text":"Master's and PhD research at UNEP-Tongji Institute of Environment for Sustainable Development. Bachelor's degree in Chinese Studies at Warsaw University, Poland. Member of the IUCN Commission on Education and Communication. Heritage Conservation Practitioner at UNESCO-WHITRAP. Senior Consultant at Lijiang Conservation and Development Association. 2024 IUCN-CEC Asia Award Winner. Recipient of Lijiang Municipality Senior Talents Service Green Card. With his extensive background in environmental science and sustainable development, and his work with organizations like UNESCO-WHITRAP and the IUCN CEC, Lukasz brings a wealth of knowledge and commitment to conservation to every program.\n","image":{"type":"ImageBlock","url":"/images/shared/presets/Lukas2.webp","altText":"Lukasz Madrzynski - Cofounder of Lijiang Cloud Mountain Education","styles":{"self":{"borderRadius":"x-large"}},"__metadata":{"modelName":"ImageBlock"}},"actions":[],"colors":"bg-light-fg-dark","styles":{"self":{"padding":["pt-4","pl-4","pb-4","pr-4"],"borderRadius":"x-large","flexDirection":"col"}},"__metadata":{"modelName":"FeaturedItem"}}],"actions":[],"variant":"two-col-grid","colors":"bg-neutral-fg-dark","styles":{"self":{"padding":["pt-6","pl-6","pb-6","pr-6"],"justifyContent":"center"},"subtitle":{"textAlign":"center"}},"__metadata":{"modelName":"FeaturedItemsSection"}},{"type":"DividerSection","title":"Divider","elementId":"","colors":"bg-neutral-fg-dark","styles":{"self":{"padding":["pt-4","pl-4","pb-4","pr-4"]}},"__metadata":{"modelName":"DividerSection"}},{"type":"GenericSection","elementId":"our-local-partners","title":{"type":"TitleBlock","text":"Our Local Partners","color":"text-primary","styles":{"self":{"textAlign":"center"}},"__metadata":{"modelName":"TitleBlock"}},"subtitle":"Passionate storytellers from the heart of Northwest Yunnan","text":"We are immensely proud of the strong relationships we've built with local communities and organizations throughout Yunnan, China. These partnerships are crucial to the authenticity and positive impact of our operations. By collaborating with local guides, guesthouses, and community initiatives in destinations like Lijiang and Shangri-La, we ensure that your travel experience directly supports the people who call this remarkable region home.\n","media":{"type":"ImageBlock","url":"/images/pages/why-us/Guides-4.webp","altText":"Local partners and community guides","styles":{"self":{"borderRadius":"x-large","width":"full"}},"__metadata":{"modelName":"ImageBlock"}},"actions":[],"colors":"bg-neutral-fg-dark","styles":{"self":{"alignItems":"center","flexDirection":"col-reverse lg:flex-row","padding":["pt-6","pl-6","pb-6","pr-6"],"justifyContent":"center"},"subtitle":{"textAlign":"center"},"text":{"textAlign":"center"}},"__metadata":{"modelName":"GenericSection"}},{"type":"DividerSection","title":"Divider","elementId":"","colors":"bg-neutral-fg-dark","styles":{"self":{"padding":["pt-4","pl-4","pb-4","pr-4"]}},"__metadata":{"modelName":"DividerSection"}},{"type":"FeaturedItemsSection","elementId":"why-choose-us","title":{"type":"TitleBlock","text":"Key Reasons to Choose Us","color":"text-primary","styles":{"self":{"textAlign":"center"}},"__metadata":{"modelName":"TitleBlock"}},"subtitle":"Our Core Difference: Passion, Expertise, and Sustainability.","text":"We believe your journey should be more than just a sightseeing trip. It should be an immersive experience that connects you deeply with the nature, the culture, and the people, while contributing positively to their well-being.","items":[{"type":"FeaturedItem","title":"Small Groups","tagline":"","subtitle":"","text":"We prioritize small groups on our programs. This fosters a more intimate and personalized experience, allowing for deeper engagement with your surroundings and the local people. It also minimizes our impact on the delicate ecosystems of Yunnan and the Tibetan areas within China.\n","image":{"type":"ImageBlock","url":"/images/pages/why-us/Private.webp","altText":"An international family enjoying a private ecotour with Lijiang Cloud Mountain.","styles":{"self":{"borderRadius":"x-large","margin":["ml-0","mr-0"]}},"__metadata":{"modelName":"ImageBlock"}},"actions":[],"colors":"bg-light-fg-dark","styles":{"self":{"padding":["pt-4","pl-2","pb-4","pr-4"],"borderRadius":"x-large","flexDirection":"col"}},"__metadata":{"modelName":"FeaturedItem"}},{"type":"FeaturedItem","title":"Handcrafted Itineraries","tagline":"","subtitle":"","text":"Our Yunnan itineraries are carefully designed to showcase the best of Northwest Yunnan and China, including off-the-beaten-track destinations and unique cultural encounters. We prioritize quality and authentic experiences over mass tourism destinations.\n","image":{"type":"ImageBlock","url":"/images/pages/why-us/Handcrafted.jpg","altText":"Kids and Parents visit authentic minority villages on handcrafted ecotours in Lijiang, Yunnan, China.","styles":{"self":{"borderRadius":"x-large"}},"__metadata":{"modelName":"ImageBlock"}},"actions":[],"colors":"bg-light-fg-dark","styles":{"self":{"padding":["pt-4","pl-4","pb-4","pr-4"],"borderRadius":"x-large","flexDirection":"col"}},"__metadata":{"modelName":"FeaturedItem"}},{"type":"FeaturedItem","title":"Sustainable Travel","tagline":"","subtitle":"","text":"We are deeply committed to minimizing our environmental footprint and maximizing our positive impact on local communities and nature throughout Yunnan province. We promote ethical and sustainable tourism practices in all of our travel destinations.\n","image":{"type":"ImageBlock","url":"/images/pages/why-us/Sustainable.webp","altText":"A family with teenage kid helping to protect nature in Lijiang, Yunnan, China.","styles":{"self":{"borderRadius":"x-large"}},"__metadata":{"modelName":"ImageBlock"}},"actions":[],"colors":"bg-light-fg-dark","styles":{"self":{"padding":["pt-4","pl-4","pb-4","pr-4"],"borderRadius":"x-large","flexDirection":"col"}},"__metadata":{"modelName":"FeaturedItem"}},{"type":"FeaturedItem","title":"Authentic Cultural Immersion","tagline":"","subtitle":"","text":"Our programs go beyond the typical tourist trails, offering genuine interactions with local communities in Yunnan, including the rich Tibetan culture of Shangri-La. You'll have opportunities to learn about traditions, witness daily life, and gain a deeper appreciation for the diverse cultures of China.\n","image":{"type":"ImageBlock","url":"/images/pages/why-us/Immersion4.webp","altText":"An international traveller interacting with a local musician on an authentic ecotourism experience in Yunnan's minority village.","styles":{"self":{"borderRadius":"x-large"}},"__metadata":{"modelName":"ImageBlock"}},"actions":[],"colors":"bg-light-fg-dark","styles":{"self":{"padding":["pt-4","pl-4","pb-4","pr-4"],"borderRadius":"x-large","flexDirection":"col"}},"__metadata":{"modelName":"FeaturedItem"}},{"type":"FeaturedItem","title":"Contributing to Real Conservation","tagline":"","subtitle":"","text":"Our team's experience in designing and implementing UNDP-GEF-SGP projects in Northwest Yunnan demonstrates our commitment to on-the-ground conservation. When you travel with us, you're supporting a company actively involved in protecting the natural beauty of Yunnan province and China at large.\n","image":{"type":"ImageBlock","url":"/images/pages/why-us/Contributing3.webp","altText":"Group photos of nature conservation and sustainable development projects in Yunnan that Cloud Mountain team was contributing in.","styles":{"self":{"borderRadius":"x-large"}},"__metadata":{"modelName":"ImageBlock"}},"actions":[],"colors":"bg-light-fg-dark","styles":{"self":{"padding":["pt-4","pl-4","pb-4","pr-4"],"borderRadius":"x-large","flexDirection":"col"}},"__metadata":{"modelName":"FeaturedItem"}},{"type":"FeaturedItem","title":"Trusted and Recognized","tagline":"","subtitle":"","text":"Our commitment to quality and sustainability has earned us recognition from major domestic and international organizations, including IUCN and UNESCO as well as various Chinese and Western media outlets, including CCTV, National Geographic, and Discovery Channel.\n","image":{"type":"ImageBlock","url":"/images/pages/why-us/Recognized.webp","altText":"Media reports and documentaries that showcase Cloud Mountain engagement in conservation and sustainability of Lijiang, Yunnan, China.","styles":{"self":{"borderRadius":"x-large"}},"__metadata":{"modelName":"ImageBlock"}},"actions":[],"colors":"bg-light-fg-dark","styles":{"self":{"padding":["pt-4","pl-4","pb-4","pr-4"],"borderRadius":"x-large","flexDirection":"col"}},"__metadata":{"modelName":"FeaturedItem"}}],"actions":[],"variant":"three-col-grid","colors":"bg-neutral-fg-dark","styles":{"self":{"padding":["pt-4","pl-4","pb-4","pr-4"],"justifyContent":"center"},"subtitle":{"textAlign":"center"}},"__metadata":{"modelName":"FeaturedItemsSection"}},{"type":"DividerSection","title":"Divider","elementId":"","colors":"bg-neutral-fg-dark","styles":{"self":{"padding":["pt-4","pl-4","pb-4","pr-4"]}},"__metadata":{"modelName":"DividerSection"}},{"type":"FeaturedItemsSection","elementId":"sustainability-action","title":{"type":"TitleBlock","text":"Our Commitment to Sustainable Travel","color":"text-primary","styles":{"self":{"textAlign":"center"}},"__metadata":{"modelName":"TitleBlock"}},"subtitle":"Sustainability is the bedrock of everything we do.","text":"We are deeply committed to responsible tourism practices and believe that travel is not only an opportunity to learn and grow but also to contribute towards sustainable development in visited areas.","items":[{"type":"FeaturedItem","title":"Engaging in Nature Conservation","tagline":"","subtitle":"","text":"We carefully plan our itineraries and encourage responsible behavior and proactive actions to protect the natural beauty of destinations around Lijiang and Shangri-La.\n","image":{"type":"ImageBlock","url":"/images/pages/why-us/Minimizing.webp","altText":"Placeholder image","styles":{"self":{"borderRadius":"x-large"}},"__metadata":{"modelName":"ImageBlock"}},"actions":[],"colors":"bg-light-fg-dark","styles":{"self":{"padding":["pt-3","pl-3","pb-3","pr-3"],"borderRadius":"x-large","flexDirection":"col"}},"__metadata":{"modelName":"FeaturedItem"}},{"type":"FeaturedItem","title":"Supporting Local Communities","tagline":"","subtitle":"","text":"We partner with local businesses, employ local guides, and ensure that our ecotours directly benefit the people and economies of the regions we visit in China.\n","image":{"type":"ImageBlock","url":"/images/pages/why-us/Supporting.webp","altText":"Placeholder image","styles":{"self":{"borderRadius":"x-large"}},"__metadata":{"modelName":"ImageBlock"}},"actions":[],"colors":"bg-ligh ity Autonomous Township\", \"Environmental Education and Ecotourism Training for the Staff of Baima Snow Mountain Nature Reserve in Shangrila Tibetan Autonomous Prefecture\", \"Public Nature Education Lectures at Lijiang Municipal Library\" and many other sustainability related projects in the region of Northwest Yunnan.\n","actions":[],"media":{"type":"ImageBlock","url":"/images/pages/why-us/Sustainability2-.webp","altText":"Dope design preview","styles":{"self":{"borderRadius":"x-large"}},"__metadata":{"modelName":"ImageBlock"}},"styles":{"self":{"alignItems":"center","flexDirection":"col-reverse lg:flex-col","justifyContent":"center","padding":["pt-4","pl-4","pb-4","pr-4"]}},"__metadata":{"modelName":"GenericSection"}},{"type":"DividerSection","title":"Divider","elementId":"","colors":"bg-neutral-fg-dark","styles":{"self":{"padding":["pt-4","pl-4","pb-4","pr-4"]}},"__metadata":{"modelName":"DividerSection"}},{"type":"GenericSection","elementId":"partnerships","title":{"type":"TitleBlock","text":"Collaboration \u0026 Partnerships","color":"text-primary","__metadata":{"modelName":"TitleBlock"}},"subtitle":"Multi-Stakeholders","colors":"bg-light-fg-dark","text":"Throughout the years, our team has established deep involvement with the local communities, organizations and institutions in Northwest Yunnan, and has earned both recognition and trust. We have actively cooperated and built relationships with wide range of stakeholders including nature reserves, national parks, forestry and conservation bureaus, NGOs and village committees across our project sites.\n","actions":[],"media":{"type":"ImageBlock","url":"/images/pages/why-us/Collaboration.webp","altText":"Dope design preview","styles":{"self":{"borderRadius":"x-large"}},"__metadata":{"modelName":"ImageBlock"}},"styles":{"self":{"alignItems":"center","flexDirection":"col-reverse lg:flex-row-reverse","justifyContent":"center","padding":["pt-4","pb-4","pl-3","pr-3"]},"text":{"textAlign":"justify"}},"__metadata":{"m
