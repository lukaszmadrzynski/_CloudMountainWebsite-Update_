oin us in the Yunnan highlands for an unforgettable eco-experience. We offer curated ecoexperiences for individuals, families, schools, and corporate groups.","colors":"bg-dark-fg-light","styles":{"self":{"justifyContent":"center","padding":["pt-16","pb-16"]}},"actions":[{"type":"Button","label":"Explore Our Ecotours","altText":"View our ecotour offerings","url":"/ecotours","showIcon":false,"icon":"arrowRight","iconPosition":"right","style":"primary","elementId":"","__metadata":{"modelName":"Button"}},{"type":"Button","label":"Partner With Us","altText":"Learn about partnership opportunities","url":"/partner-with-us","showIcon":false,"icon":"arrowRight","iconPosition":"right","style":"secondary","elementId":"","__metadata":{"modelName":"Button"}}],"__metadata":{"modelName":"GenericSection"}},{"type":"GenericSection","title":{"type":"TitleBlock","text":"Cloud Mountain","color":"text-dark","__metadata":{"modelName":"TitleBlock"}},"subtitle":"Your Sustainable Travel Companion","text":"We are dedicated to providing exceptional travel experiences that support local communities and sustainable development in some of the most vulnerable areas of Yunnan province, China. Learn more about our mission and team.\n","actions":[{"type":"Button","label":"About Us","url":"/why-us","icon":"arrowRight","iconPosition":"right","style":"secondary","__metadata":{"modelName":"Button"}}],"media":{"type":"ImageBlock","url":"/images/blog/iscovering-naxi-culinary-traditions/About Us Banner OPT.webp","altText":"Cloud Mountain Ecotours and Nature Education","__metadata":{"modelName":"ImageBlock"}},"badge":{"type":"Badge","label":"About Us","color":"text-primary","__metadata":{"modelName":"Badge"}},"colors":"bg-light-fg-dark","styles":{"self":{"alignItems":"center","flexDirection":"row-reverse","padding":["pt-8","pb-8","pl-2","pr-2"],"justifyContent":"center"}},"__metadata":{"modelName":"GenericSection"}}],"markdown_content":"When traveling through the Yunnan highlands, where you stay matters as much as what you see. Sustainable lodging options combine traditional architectural wisdom with modern eco-conscious practices, offering authentic experiences that benefit both travelers and local communities.\n\n![Traditional Naxi courtyard house](/images/tours/wild-heart-of-lijiang/highlight-1.webp)\n\n## Traditional Naxi Courtyard Stays\n\nIn Lijiang's Old Town, family-run courtyard guesthouses have been lovingly restored using traditional materials and techniques. These centuries-old homes feature wooden structures, private gardens, and the famous \"monkey head\" roof tiles that have weathered countless seasons.\n\n![Solar panels on traditional roof](/images/tours/hidden-jade-dragon/highlight-4.webp)\n\n## Eco-Lodges in the Mountains\n\nMountain retreats around Wenhai and the Jade Dragon Snow Mountain foothills embrace off-grid living. Solar power, rainwater harvesting, and organic gardens are standard features. Many lodges source ingredients from neighboring farms, creating a farm-to-table experience.\n\n![Mountain eco-lodge exterior](/images/tours/natgeo-forever-walk/highlight-3.webp)\n\n## Tibetan Hospitality in Shangri-La\n\nIn the Tibetan regions, sustainable homestays offer unique cultural exchange opportunities. Families open their homes to travelers, sharing traditional meals, stories, and daily activities while maintaining their traditional way of life.\n\n![Traditional Tibetan hospitality](/images/blog/irst-year-sustainable-ecotourism-yunnan/Guides.jpg)\n\n## What Makes Lodging Sustainable?\n\nLook for certifications and practices like:\n\n- Solar energy and renewable power systems\n- Water conservation and recycling programs\n- Organic, locally-sourced food\n- Waste reduction and composting\n- Employment of local community members\n- Support for local artisans and producers\n\n![Community meeting space at eco-lodge](/images/tours/wenhai-sanctuary/banner.webp)\n\n## Our Partner Properties\n\nWe've carefully selected lodging partners who share our commitment to sustainability. Each property meets rigorous environmental and social standards, ensuring your stay supports conservation and community development.\n\nWhether you choose a restored Naxi courtyard, a mountain eco-lodge, or a Tibetan family home, sustainable accommodations enhance your journey while preserving the landscapes and cultures that make Yunnan special.\n"},"site":{"favicon":"/images/shared/brand/cm-logo-color.png","footer":{"logo":{"url":"/images/shared/brand/cm-logo-footer.webp","altText":"Logo light","type":"ImageBlock","__metadata":{"modelName":"ImageBlock"}},"text":"","primaryLinks":{"type":"FooterLinksGroup","title":"","links":[{"label":"EcoTours","altText":"Ecotours page","url":"/ecotours","icon":"arrowRight","iconPosition":"right","style":"secondary","type":"Link","__metadata":{"modelName":"Link"}},{"type":"Link","label":"Why Us","altText":"","url":"/why-us","showIcon":false,"icon":"arrowRight","iconPosition":"right","style":"secondary","elementId":"","__metadata":{"modelName":"Link"}},{"type":"Link","label":"Partner With Us","altText":"","url":"/partner-with-us","showIcon":false,"icon":"arrowRight","iconPosition":"right","style":"secondary","elementId":"","__metadata":{"modelName":"Link"}},{"type":"Link","label":"Blog","altText":"","url":"/blog","showIcon":false,"icon":"arrowRight","iconPosition":"right","style":"secondary","elementId":"","__metadata":{"modelName":"Link"}},{"type":"Link","label":"Contact Us","altText":"","url":"/contact-us","showIcon":false,"icon":"arrowRight","iconPosition":"right","style":"secondary","elementId":"","__metadata":{"modelName":"Link"}}],"__metadata":{"modelName":"FooterLinksGroup"}},"socialLinks":[{"altText":"Instagram link","url":"https://www.instagram.com/cloud.mountain.ecotours/","icon":"instagram","type":"Social","__metadata":{"modelName":"Social"}},{"altText":"LinkedIn link","url":"https://www.linkedin.com/company/cloud-mountain-sustainability/","icon":"linkedin","type":"Social","__metadata":{"modelNa
